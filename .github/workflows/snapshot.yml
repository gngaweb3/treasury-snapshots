name: Treasury Snapshot

on:
  schedule:
    - cron: '0 * * * *'  # Cada hora
  workflow_dispatch:       # Para correrlo manualmente también

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Take Treasury Snapshot
        run: |
          node -e "
          const https = require('https');

          async function main() {
            // 1. Obtener precios de CoinGecko
            const ids = 'pax-gold,quant-network,chainlink,polygon-ecosystem-token,ripple,hyperliquid';
            const prices = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=' + ids + '&vs_currencies=usd')
              .then(r => r.json());

            const p = {
              paxg: prices['pax-gold']?.usd || 0,
              qnt: prices['quant-network']?.usd || 0,
              link: prices['chainlink']?.usd || 0,
              pol: prices['polygon-ecosystem-token']?.usd || 0,
              xrp: prices['ripple']?.usd || 0,
              hype: prices['hyperliquid']?.usd || 0,
            };

            // 2. Leer balances on-chain
            async function rpcCall(url, method, params) {
              const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ jsonrpc: '2.0', method, params, id: 1 })
              }).then(r => r.json());
              return res.result;
            }

            function hexToFloat(hex, decimals) {
              return parseInt(hex, 16) / Math.pow(10, decimals);
            }

            function balanceOfCall(contract, wallet) {
              const sig = '0x70a08231';
              const padded = wallet.replace('0x','').padStart(64,'0');
              return { to: contract, data: sig + padded };
            }

            const MASTER = '0x315A47b154AA253F5660eDe42b64b4acD8402280';
            const SUB_ETH = '0xb9448016187B4DB709d24cC01AbaDbF3C654E175';
            const SUB_BNB = '0x9Fff9979A425AbD28c825406A64a31c524b7e403';
            const SUB_HYPE = '0x3f92214A1558E6b2d1734dFCD6DD105D37f454ab';

            const ETH_RPC = 'https://ethereum-rpc.publicnode.com';
            const POL_RPC = 'https://polygon-bor-rpc.publicnode.com';
            const BNB_RPC = 'https://bsc-rpc.publicnode.com';
            const HYPE_RPC = 'https://rpc.hyperliquid.xyz/evm';

            // PAXG
            const paxgRaw = await rpcCall(ETH_RPC, 'eth_call', [balanceOfCall('0x45804880De22913dAFE09f4980848ECE6EcbAf78', MASTER), 'latest']);
            const paxg = hexToFloat(paxgRaw, 18);

            // QNT
            const qntRaw = await rpcCall(ETH_RPC, 'eth_call', [balanceOfCall('0x4a220E6096B25EADb88358cb44068A3248254675', MASTER), 'latest']);
            const qnt = hexToFloat(qntRaw, 18);

            // LINK
            const linkRaw = await rpcCall(POL_RPC, 'eth_call', [balanceOfCall('0x53E0bca35eC356BD5ddDFebbD1Fc0fD03FaBad39', MASTER), 'latest']);
            const link = hexToFloat(linkRaw, 18);

            // POL nativo
            const polRaw = await rpcCall(POL_RPC, 'eth_getBalance', [MASTER, 'latest']);
            const pol = hexToFloat(polRaw, 18);

            // WXRP
            const wxrpRaw = await rpcCall(BNB_RPC, 'eth_call', [balanceOfCall('0x1D2F0da169ceB9fC7B3144628dB156f3F6c60dBE', MASTER), 'latest']);
            const wxrp = hexToFloat(wxrpRaw, 18);

            // HYPE nativo
            const hypeRaw = await rpcCall(HYPE_RPC, 'eth_getBalance', [MASTER, 'latest']);
            const hype = hexToFloat(hypeRaw, 18);

            // stPOL
            const stpolRaw = await rpcCall(ETH_RPC, 'eth_call', [balanceOfCall('0x3B790d651e950497c7723D47B24E6f61534f7969', SUB_ETH), 'latest']);
            const stpol = hexToFloat(stpolRaw, 18);

            // vXRP (Venus)
            const sig = '0x70a08231';
            const padded = SUB_BNB.replace('0x','').padStart(64,'0');
            const vxrpRaw = await rpcCall(BNB_RPC, 'eth_call', [{ to: '0xB248a295732e0225acd3337607cc01068e3b9c10', data: sig + padded }, 'latest']);
            const vxrpBalance = parseInt(vxrpRaw, 16);

            const rateSig = '0x182df0f5';
            const rateRaw = await rpcCall(BNB_RPC, 'eth_call', [{ to: '0xB248a295732e0225acd3337607cc01068e3b9c10', data: rateSig }, 'latest']);
            const rate = parseInt(rateRaw, 16);
            const vxrp = (vxrpBalance * rate) / Math.pow(10, 36);

            // 3. Calcular totales
            const base_assets_usd =
              (paxg * p.paxg) +
              (qnt * p.qnt) +
              (link * p.link) +
              (pol * p.pol) +
              (wxrp * p.xrp) +
              (hype * p.hype);

            const yield_usd =
              (stpol * p.pol) +
              (vxrp * p.xrp);

            const treasury_total_usd = base_assets_usd + yield_usd;

            console.log('Base Assets USD:', base_assets_usd);
            console.log('Yield USD:', yield_usd);
            console.log('Total USD:', treasury_total_usd);

            // 4. Guardar en Supabase
            const res = await fetch(process.env.SUPABASE_URL + '/rest/v1/treasury_snapshots', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'apikey': process.env.SUPABASE_ANON_KEY,
                'Authorization': 'Bearer ' + process.env.SUPABASE_ANON_KEY,
                'Prefer': 'return=minimal'
              },
              body: JSON.stringify({
                treasury_total_usd: treasury_total_usd.toFixed(2),
                base_assets_usd: base_assets_usd.toFixed(2),
                yield_usd: yield_usd.toFixed(2)
              })
            });

            if (res.ok) {
              console.log('Snapshot guardado exitosamente');
            } else {
              const err = await res.text();
              console.error('Error guardando snapshot:', err);
              process.exit(1);
            }
          }

          main().catch(e => { console.error(e); process.exit(1); });
          "
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
